<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadership &amp; Self-Deception — Companion</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <header id="site-header" role="banner">
    <div class="header-inner">
      <a href="#/" class="site-logo" aria-label="Home — LSD Companion">
        <span class="logo-mark">◈</span>
        <span class="logo-text">LSD Companion</span>
      </a>
      <nav id="part-nav" aria-label="Book parts"></nav>
      <div class="header-meta">
        <div class="progress-wrap" title="Overall completion">
          <div id="overall-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Overall progress">
            <div id="overall-progress-fill"></div>
          </div>
          <span id="overall-progress-label" class="progress-label">0%</span>
        </div>
        <button id="settings-btn" class="icon-btn" aria-label="Settings" aria-haspopup="dialog">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M9 1v2M9 15v2M1 9h2M15 9h2M3.22 3.22l1.41 1.41M13.37 13.37l1.41 1.41M3.22 14.78l1.41-1.41M13.37 4.63l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main id="main-content" role="main" tabindex="-1"></main>

  <!-- Tells Pulse floating widget -->
  <div id="tells-pulse-widget" aria-live="polite">
    <button id="tells-pulse-btn" class="pulse-fab" aria-label="Log a tell — Tells Pulse" aria-haspopup="dialog" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" aria-hidden="true">
        <circle cx="11" cy="11" r="9" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="11" cy="11" r="3" fill="currentColor"/>
        <path d="M11 2v3M11 17v3M2 11h3M17 11h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="pulse-badge" id="pulse-badge" hidden>0</span>
    </button>
    <div id="tells-pulse-panel" role="dialog" aria-label="Tells Pulse" aria-modal="true" hidden>
      <!-- populated by companion.js -->
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="modal-overlay" hidden aria-hidden="true"></div>
  <div id="settings-modal" role="dialog" aria-modal="true" aria-label="Settings" hidden tabindex="-1">
    <!-- populated by app.js -->
  </div>

  <!-- Toast notifications -->
  <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
